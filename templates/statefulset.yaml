{{- $volumeClaimTemplateLabels := dict -}}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) -}}
{{- $existingStatefulSet := lookup "apps/v1" "StatefulSet" .Release.Namespace (include "gitkb-server.fullname" .) -}}
{{- if $existingStatefulSet -}}
{{- $existingVolumeClaimTemplates := dig "spec" "volumeClaimTemplates" (list) $existingStatefulSet -}}
{{- if gt (len $existingVolumeClaimTemplates) 0 -}}
{{- $volumeClaimTemplateLabels = dig "metadata" "labels" (dict) (index $existingVolumeClaimTemplates 0) -}}
{{- end -}}
{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gitkb-server.fullname" . }}
  labels:
    {{- include "gitkb-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "gitkb-server.fullname" . }}
  selector:
    matchLabels:
      {{- include "gitkb-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gitkb-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gitkb-server.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gitkb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: GITKB_ROOT
              value: {{ .Values.gitkb.root | quote }}
            - name: GITKB_HOST
              value: {{ .Values.server.host | quote }}
            - name: GITKB_PORT
              value: {{ .Values.server.port | quote }}
            - name: GITKB_LOG_FORMAT
              value: {{ .Values.server.logFormat | quote }}
            - name: GITKB_NO_EMBEDDINGS
              value: {{ .Values.server.noEmbeddings | quote }}
            - name: GITKB_STARTUP_CHECK
              value: {{ .Values.startupCheck.enabled | quote }}
            - name: GITKB_ORG
              value: {{ .Values.gitkb.org | quote }}
            - name: GITKB_INSTANCE
              value: {{ .Values.gitkb.instance | quote }}
            - name: GITKB_NAME
              value: {{ .Values.gitkb.name | quote }}
            - name: GITKB_SEED_MODE
              value: {{ .Values.seed.mode | quote }}
            {{- if and (ne .Values.seed.mode "empty") .Values.seed.secretRef.name .Values.seed.secretRef.key }}
            - name: GITKB_SEED_FILE
              value: {{ printf "/seed/%s" (.Values.seed.fileName | default .Values.seed.secretRef.key) | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            {{- if and (ne .Values.seed.mode "empty") .Values.seed.secretRef.name .Values.seed.secretRef.key }}
            - name: seed
              mountPath: /seed
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and (ne .Values.seed.mode "empty") .Values.seed.secretRef.name .Values.seed.secretRef.key }}
        - name: seed
          secret:
            secretName: {{ .Values.seed.secretRef.name }}
            items:
              - key: {{ .Values.seed.secretRef.key }}
                path: {{ .Values.seed.fileName | default .Values.seed.secretRef.key }}
        {{- end }}
        {{- if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- else if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
{{ if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- if $volumeClaimTemplateLabels }}
          {{- toYaml $volumeClaimTemplateLabels | nindent 10 }}
          {{- else }}
          {{- include "gitkb-server.labels" . | nindent 10 }}
          {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
